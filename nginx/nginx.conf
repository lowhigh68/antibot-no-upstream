# ============================================================
# /usr/local/openresty/nginx/conf/nginx.conf
#
# Kiến trúc đúng — terminate TLS tại nginx http layer:
#
#   Client → 192.168.168.123:443/80
#          → nginx http block (terminate TLS, JA3 capture)
#          → proxy_pass → Apache 127.0.0.1:8080/8081
#
# KHÔNG dùng stream block — stream TLS passthrough + proxy_protocol
# không đảm bảo lấy được IP thật ($remote_addr bị thay = 127.0.0.1)
#
# Với kiến trúc này:
#   $remote_addr = IP thật của client (luôn luôn, không cần realip module)
#   ssl_client_hello_by_lua_block = JA3 capture hoạt động bình thường
#   lua_package_path trong http{} = có hiệu lực với mọi phase
# ============================================================

user nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /usr/local/openresty/nginx/logs/error.log  warn;
pid        /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

# KHÔNG có stream block

http {
    include      /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # /conf/?.lua → require("antibot.X") tìm /conf/antibot/X.lua ✓
    lua_package_path "/usr/local/openresty/nginx/conf/?.lua;/usr/local/openresty/nginx/conf/?/init.lua;/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/site/lualib/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";

    lua_package_cpath "/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;;";

    lua_shared_dict  antibot_tls      10m;
    lua_shared_dict  whitelist_cache   1m;
    lua_shared_dict  antibot_stats     1m;
    lua_shared_dict  antibot_ua_cache  2m; 
    lua_shared_dict  antibot_cache    5m;

    lua_code_cache  on;

    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 1s;

    init_worker_by_lua_block {
        require("antibot").init_worker()
    }

    log_format  main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" ${request_time}s';

    log_format  antibot_fmt '$remote_addr [$time_local] "$request" $status score=$sent_http_x_bot_score action=$sent_http_x_bot_action fp=$sent_http_x_bot_fp tls13=$sent_http_x_bot_tls13 ja3_partial=$sent_http_x_bot_ja3partial ${request_time}s';

    log_format  bytes '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    include /usr/local/openresty/nginx/conf/default.conf;
    include /usr/local/openresty/nginx/conf/hostname.conf;
    include /usr/local/openresty/nginx/conf/user/*/domains/*.conf;
}
